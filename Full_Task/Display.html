<!DOCTYPE html>
<html>
<head>
  <style>
    .box {
      background: lightblue;
      border: 2px solid black;
      margin: 5px;
    }

    .block {
      display: block;
    }

    .inline {
      display: inline;
    }

    .inline-block {
      display: inline-block;
      width: 100px;
      height: 50px;
    }

    .none {
      display: none;
    }
  </style>
</head>
<body>

  <div class="box block">Block</div>
  <div class="box block">Block</div>

  <span class="box inline">Inline</span>
  <span class="box inline">Inline</span>

  <div class="box inline-block">Inline-Block</div>
  <div class="box inline-block">Inline-Block</div>

  <div class="box none">You can't see me</div>

</body>
</html>
