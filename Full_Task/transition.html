<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
    font-family: Arial;
    padding: 40px;
    }

    /* ===== TRANSITION ===== */
  .btn {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;

    transition: all 0.3s ease; /* 🔥 smooth change */
  }

  .btn:hover {
    background: #0056b3;
    transform: scale(1.1); /* 🔥 transform + transition */
  }

  /* ===== TRANSFORM ===== */
  .box {
    width: 100px;
    height: 100px;
    background: orange;
    margin-top: 30px;

    transition: transform 0.3s;
  }

  .box:hover {
    transform: rotate(15deg) translateX(20px);
  }

  /* ===== KEYFRAME ANIMATION ===== */
  .loader {
    width: 40px;
    height: 40px;
    margin-top: 40px;
    border: 5px solid #ccc;
    border-top: 5px solid #007bff;
    border-radius: 50%;

    animation: spin 1s linear infinite; /* 🔥 */
  }

  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

    </style>
</head>
<body>
    <!-- TRANSITION -->
  <button class="btn">Hover me</button>

  <!-- TRANSFORM -->
  <div class="box"></div>

  <!-- KEYFRAME -->
  <div class="loader"></div>
</body>
</html>
